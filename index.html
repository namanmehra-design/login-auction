<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPL Mega Auction 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4A847;--gold-l:#F0C96B;--gold-dim:rgba(212,168,71,0.12);
  --red:#C0392B;--red-dim:rgba(192,57,43,0.12);
  --bg:#07090F;--bg2:#0C1018;--bg3:#111827;
  --sur:rgba(255,255,255,0.04);--sur2:rgba(255,255,255,0.07);
  --bdr:rgba(255,255,255,0.07);--bdr-hi:rgba(255,255,255,0.12);--bdr-g:rgba(212,168,71,0.35);
  --txt:#EDE9E0;--muted:#6B7280;--muted2:#9CA3AF;
  --ok:#10B981;--err:#EF4444;--info:#3B82F6;
  --ff:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;
  --r:10px;--rl:16px;--rxl:22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 90% 55% at 15% 5%,rgba(212,168,71,.055) 0%,transparent 65%),radial-gradient(ellipse 70% 45% at 85% 95%,rgba(192,57,43,.045) 0%,transparent 60%);pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

/* Toast */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--bg3);border:1px solid var(--bdr-hi);border-radius:50px;padding:11px 22px;font-size:.84rem;font-weight:500;display:flex;align-items:center;gap:9px;z-index:9999;transition:transform .38s cubic-bezier(.34,1.56,.64,1);max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,.6);}
#toast.show{transform:translateX(-50%) translateY(0);}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
#toast.ok .tdot{background:var(--ok);}#toast.err .tdot{background:var(--err);}#toast.info .tdot{background:var(--gold);}

/* Views */
.view{display:none;}.view.active{display:block;animation:fu .3s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
#auth-view{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;z-index:200;background:var(--bg);overflow-y:auto;}
#auth-view.active{display:flex;}

/* Modal overlay */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--bdr-hi);border-radius:var(--rxl);padding:28px;width:100%;max-width:420px;animation:fu .25s ease both;}
.modal h3{font-family:var(--ff);font-size:22px;color:var(--gold);margin-bottom:16px;letter-spacing:.04em;}

/* Auth Card */
.auth-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rxl);overflow:hidden;}
.auth-hdr{padding:34px 30px 26px;background:linear-gradient(150deg,rgba(212,168,71,.09),transparent);border-bottom:1px solid var(--bdr);text-align:center;}
.auth-logo{width:54px;height:54px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:15px;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:26px;color:#fff;margin:0 auto 14px;box-shadow:0 8px 28px rgba(212,168,71,.22);}
.auth-brand{font-family:var(--ff);font-size:30px;color:var(--gold);letter-spacing:.06em;}
.auth-tag{font-size:.8rem;color:var(--muted);margin-top:3px;}
.auth-bdy{padding:26px 30px;}
.auth-lbl{font-size:.95rem;font-weight:600;color:var(--txt);margin-bottom:18px;}
.pw-hint{font-size:.75rem;color:var(--muted);margin-top:4px;}

/* Fields */
.fld{margin-bottom:13px;}
.fld label{display:block;font-size:.75rem;font-weight:600;color:var(--muted2);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase;}
input[type=text],input[type=email],input[type=password],input[type=number],select,textarea{width:100%;padding:12px 14px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt);font-family:var(--fb);font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--bdr-g);box-shadow:0 0 0 3px rgba(212,168,71,.07);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:#0C1018;}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 18px;border:none;border-radius:var(--r);font-family:var(--fb);font-size:.95rem;font-weight:600;cursor:pointer;transition:all .18s;}
.btn:active{transform:scale(.98);}
.btn-gold{background:var(--gold);color:#0a0800;}.btn-gold:hover{background:var(--gold-l);}
.btn-outline{background:transparent;border:1px solid var(--bdr-hi);color:var(--txt);}.btn-outline:hover{border-color:var(--bdr-g);background:var(--gold-dim);}
.btn-ghost{background:var(--sur);color:var(--muted2);border:1px solid var(--bdr);}.btn-ghost:hover{background:var(--sur2);color:var(--txt);}
.btn-danger{background:rgba(239,68,68,.1);color:var(--err);border:1px solid rgba(239,68,68,.3);}.btn-danger:hover{background:rgba(239,68,68,.18);}
.btn-success{background:rgba(16,185,129,.12);color:var(--ok);border:1px solid rgba(16,185,129,.3);}
.btn-info{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}
.btn-sm{padding:8px 14px;font-size:.85rem;width:auto;}
.btn-white{background:#fff;color:#111;gap:10px;}.btn-white:hover{background:#f3f3f3;}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:.8rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr);}
.tbtn{background:none;border:none;color:var(--info);font-size:.85rem;cursor:pointer;text-decoration:underline;font-family:var(--fb);padding:0;}

/* App Shell */
#app-shell{display:none;flex-direction:column;min-height:100vh;}
#app-shell.active{display:flex;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;}
.tb-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:18px;color:#fff;}
.tb-title{font-family:var(--ff);font-size:20px;color:var(--gold);letter-spacing:.05em;}
.tb-user{font-size:.75rem;color:var(--muted);}
.content{flex:1;padding:18px;max-width:960px;margin:0 auto;width:100%;position:relative;z-index:1;}

/* Dash Tabs */
.dtabs{display:flex;gap:4px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);padding:5px;margin-bottom:20px;}
.dtab{flex:1;padding:10px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-family:var(--fb);font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.dtab.active{background:var(--bg3);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.3);}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;}
.card-hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-family:var(--ff);font-size:20px;color:var(--gold);letter-spacing:.04em;}
.card-bdy{padding:20px;}

/* Room cards */
.rc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;margin-bottom:9px;display:flex;align-items:center;gap:14px;transition:border-color .2s; cursor: pointer;}
.rc:hover{border-color:var(--bdr-g);}
.rc-icon{width:40px;height:40px;border-radius:10px;background:var(--gold-dim);border:1px solid var(--bdr-g);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rc-info{flex:1;min-width:0;}
.rc-name{font-weight:600;font-size:.93rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-meta{font-size:.76rem;color:var(--muted);margin-top:2px;}
.rc-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600;}
.bg{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,168,71,.25);}
.bb{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25);}
.bs{background:rgba(16,185,129,.1);color:var(--ok);border:1px solid rgba(16,185,129,.25);}
.br{background:var(--red-dim);color:#f87171;border:1px solid rgba(239,68,68,.25);}

/* Auction block */
.ablock{border:2px dashed var(--bdr-hi);border-radius:var(--rxl);padding:36px 20px;text-align:center;background:rgba(0,0,0,.3);margin-bottom:16px;}
.pname{font-family:var(--ff);font-size:2.6rem;color:var(--gold);letter-spacing:.03em;line-height:1;margin-bottom:6px;}
.base-lbl{font-size:.95rem;color:var(--muted);}

.anav{display:flex;gap:4px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);padding:4px;flex-wrap:wrap;margin-bottom:14px;}
.anav-btn{padding:9px 16px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-family:var(--fb);font-size:.83rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;}
.anav-btn.active{background:var(--bg3);color:var(--txt);box-shadow:0 2px 6px rgba(0,0,0,.3);}

.ni-btn{width:100%;padding:12px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.07);color:#f87171;border-radius:var(--r);font-family:var(--fb);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .18s;margin-top:8px;}
.ni-btn.pressed{background:rgba(239,68,68,0.3); border-color:var(--err); color:#fff; cursor:default;}
.ni-strip{display:none;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.15);border-radius:var(--r);padding:9px 14px;margin-top:8px;font-size:.82rem;}
.ni-strip.show{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
</style>
</head>
<body>

<div id="toast"><span class="tdot"></span><span id="tmsg"></span></div>

<div class="modal-bg" id="teamNameModal">
  <div class="modal">
    <h3>🏏 Register Your Team</h3>
    <div class="fld"><label>Your Team Name</label><input type="text" id="modalTeamName" maxlength="30"></div>
    <div style="display:flex;gap:10px;margin-top:6px;">
      <button class="btn btn-gold" onclick="window.confirmTeamName()">Join Room →</button>
      <button class="btn btn-ghost btn-sm" onclick="window.closeTeamModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="auth-view" class="view active">
  <div class="auth-card">
    <div class="auth-hdr">
      <div class="auth-logo">🏏</div>
      <div class="auth-brand">IPL AUCTION 2026</div>
    </div>
    <div class="auth-bdy">
      <div class="auth-lbl" id="authLabel">Sign in to continue</div>
      <div class="fld"><label>Email</label><input type="email" id="authEmail"></div>
      <div class="fld"><label>Password</label><input type="password" id="authPassword"></div>
      <button class="btn btn-gold" onclick="window.handleAuth()" id="authBtn">Sign In</button>
      <div class="divider">or</div>
      <button class="btn btn-white" onclick="window.signInWithGoogle()">Google Login</button>
      <div style="margin-top:15px; text-align:center;"><button class="tbtn" onclick="window.toggleAuthMode()" id="authToggleBtn">Create account</button></div>
    </div>
  </div>
</div>

<div id="app-shell" class="view">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="tb-logo">🏏</div>
      <div><div class="tb-title">IPL AUCTION 2026</div><div class="tb-user" id="topbarUser"></div></div>
    </div>
    <button class="btn btn-danger btn-sm" onclick="window.logoutUser()">Sign Out</button>
  </div>

  <div class="content">
    <div id="dashboard-view" class="view">
      <div class="dtabs">
        <button class="dtab active" id="dt-created" onclick="switchDashTab('created')">🏟️ My Rooms</button>
        <button class="dtab" id="dt-scorecards" onclick="switchDashTab('scorecards')">📋 Scorecards</button>
      </div>

      <div id="tab-created">
        <div class="card">
          <div class="card-hdr"><span class="card-title">My Auction Rooms</span><button class="btn btn-gold btn-sm" onclick="window.toggleCreateForm()">+ New Room</button></div>
          <div class="card-bdy">
            <div id="create-form" style="display:none; margin-bottom:20px;">
              <div class="fld"><label>Name</label><input type="text" id="newRoomName"></div>
              <button class="btn btn-gold" onclick="window.createNewRoom()">Create</button>
            </div>
            <div id="roomListContainer"></div>
          </div>
        </div>
      </div>

      <div id="tab-scorecards" style="display:none;">
          <div class="card">
              <div class="card-hdr"><span class="card-title">Match Screenshot Parser</span></div>
              <div class="card-bdy">
                  <div class="ai-parse-box">
                      <div id="gscDropZone" onclick="document.getElementById('gscFiles').click()" style="border:2px dashed var(--bdr);padding:30px;text-align:center;cursor:pointer;">
                          📸 Click to upload match images
                      </div>
                      <input type="file" id="gscFiles" accept="image/*" multiple style="display:none" onchange="window.handleGscFiles(this.files)">
                      <div id="gscThumbRow" style="display:flex;gap:10px;margin-top:15px;"></div>
                      <button class="btn btn-gold" onclick="window.parseGlobalScorecard()">✨ Parse with Gemini</button>
                      <div class="ai-status" id="gscParseStatus"></div>
                  </div>
              </div>
          </div>
      </div>
    </div>

    <div id="auction-view" class="view">
      <div class="at">
        <button class="btn btn-ghost btn-sm" onclick="window.backToDashboard()">← Home</button>
        <span class="at-title" id="roomTitleDisplay">Room</span>
        <span class="badge" id="roomRoleBadge"></span>
      </div>

      <div class="anav">
        <button class="anav-btn active" onclick="switchTab('auction')">🔨 Block</button>
        <button class="anav-btn" onclick="switchTab('points')">🏅 Points</button>
        <button class="anav-btn" onclick="switchTab('setup')">⚙️ Setup</button>
      </div>

      <div id="auction-tab" class="card">
        <div class="card-bdy">
          <div class="my-team-badge" id="myTeamBadge" style="display:none;">🏏 Bidding as: <strong id="myTeamName"></strong></div>
          <div class="ablock" id="auctionBlockDisplay">Waiting...</div>
          <div id="biddingControls" style="display:none;">
            <div class="bid-disp"><div class="bid-amt" id="liveBidText">₹0.00</div></div>
            <button class="ni-btn" id="niBtn" onclick="window.pressNotInterested()">🙅 Not Interested</button>
          </div>
        </div>
      </div>

      <div id="setup-tab" class="card" style="display:none;">
        <div class="card-bdy">
          <button class="btn btn-gold" id="initBtn" onclick="window.initializeAuctionData()">Initialize 250 Players</button>
          <div id="adminRegBanner" style="display:none; margin-top:15px;">
              <button class="btn btn-gold btn-sm" onclick="window.adminRegisterTeam()">Register My Team</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import{getDatabase,ref,set,onValue,update,push,get,remove}from"https://www.gstatic.com/firebasejs/12.3.0/firebase-database.js";
import{getAI,getGenerativeModel,GoogleAIBackend}from"https://www.gstatic.com/firebasejs/12.3.0/firebase-ai.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut,GoogleAuthProvider,signInWithPopup}from"https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

const cfg={apiKey:"AIzaSyCjTwIQapCFbAXkHlPYBdX8Hob_gVJZs98",authDomain:"ipl-auction-26.firebaseapp.com",databaseURL:"https://ipl-auction-26-default-rtdb.firebaseio.com",projectId:"ipl-auction-26",storageBucket:"ipl-auction-26.firebasestorage.app",messagingSenderId:"201005854292",appId:"1:201005854292:web:c223f76d9194a2f8a047c1"};
const app=initializeApp(cfg),db=getDatabase(app),auth=getAuth(app),gp=new GoogleAuthProvider();

let _geminiModel=null;
function getGeminiModel(){
  if(_geminiModel) return _geminiModel;
  try{
    const ai=getAI(app,{backend:new GoogleAIBackend()});
    _geminiModel=getGenerativeModel(ai,{model:"gemini-1.5-flash"});
    return _geminiModel;
  }catch(e){ return null; }
}

let user=null,roomId=null,roomState=null,isAdmin=false,myTeamName='',isSignup=false, autoSellInProgress=false;
let gscImageFiles=[];

// ── SCORING ENGINE ──
function calcBattingPoints(runs, balls, fours, sixes, dismissal, isWinningTeam, isMotm){
  if(dismissal==='noresult') return 0;
  let pts = runs + (Math.floor(runs / 25) * 10) + fours + (sixes * 2);
  if(dismissal==='duck') pts -= 5;
  if(balls >= 10 || runs >= 10){
    const sr = (runs / balls) * 100;
    if(sr < 75) pts -= 15; else if(sr < 100) pts -= 10; else if(sr < 150) pts += 5; else if(sr < 200) pts += 10; else pts += 15;
  }
  return pts + (isWinningTeam?5:0) + (isMotm?25:0);
}

function calcBowlingPoints(overs, runs, wkts, dots, maidens, isWin, isMotm){
  if(overs === 0) return isWin ? 5 : 0;
  let pts = (wkts * 25) + (wkts >= 2 ? 10 : 0) + (wkts > 2 ? (wkts-2)*10 : 0) + dots + (maidens * 20);
  const eco = runs / overs;
  if(eco <= 5) pts += 15; else if(eco <= 8) pts += 10; else if(eco <= 10) pts += 5; else if(eco <= 12) pts -= 10; else pts -= 15;
  return pts + (isWin?5:0) + (isMotm?25:0);
}

function calcFieldingPoints(c, s, r, win, motm){ return (c*10)+(s*15)+(r*10)+(win?5:0)+(motm?25:0); }

// ── Auth Logic ──
onAuthStateChanged(auth, u => {
  user=u;
  const rp=new URLSearchParams(window.location.search).get('room');
  if(u){
    document.getElementById('topbarUser').textContent=u.email;
    document.getElementById('auth-view').classList.remove('active');
    document.getElementById('app-shell').classList.add('active');
    if(rp) loadRoom(rp); else loadDash();
  } else {
    document.getElementById('auth-view').classList.add('active');
  }
});

window.handleAuth=()=>{
  const email=document.getElementById('authEmail').value;
  const pass=document.getElementById('authPassword').value;
  const fn=isSignup?createUserWithEmailAndPassword:signInWithEmailAndPassword;
  fn(auth,email,pass).catch(e=>showAlert(e.message));
};

window.toggleAuthMode=()=>{
    isSignup=!isSignup;
    document.getElementById('authLabel').textContent=isSignup?'Create Account':'Sign In';
    document.getElementById('authBtn').textContent=isSignup?'Create':'Login';
};

// ── Image Logic (FIXED) ──
window.handleGscFiles=(files)=>{
    gscImageFiles=Array.from(files).slice(0,4);
    const row=document.getElementById('gscThumbRow');
    row.innerHTML='';
    gscImageFiles.forEach(file=>{
        const reader=new FileReader();
        reader.onload=e=>{
            const img=document.createElement('img');
            img.src=e.target.result;
            img.style.height='60px'; row.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
};

window.parseGlobalScorecard=async()=>{
    if(!gscImageFiles.length) return showAlert('Upload images');
    document.getElementById('gscParseStatus').textContent='Parsing...';
    try{
        const parts=await Promise.all(gscImageFiles.map(file=>new Promise(res=>{
            const reader=new FileReader();
            reader.onload=e=>res({inlineData:{data:e.target.result.split(',')[1],mimeType:file.type}});
            reader.readAsDataURL(file);
        })));
        const res=await getGeminiModel().generateContent({contents:[{role:'user',parts:[...parts,{text:"Return scorecard JSON"}]}]});
        console.log(res.response.text());
        document.getElementById('gscParseStatus').textContent='Done!';
    }catch(e){ document.getElementById('gscParseStatus').textContent='Error'; }
};

// ── Auction Block (FIXED) ──
function loadRoom(rid){
    roomId=rid;
    onValue(ref(db, `auctions/${rid}`), snap => {
        const data=snap.val(); if(!data) return;
        roomState=data; isAdmin=data.adminUid===user.uid;
        myTeamName=data.members?.[user.uid]?.teamName||'';
        document.getElementById('roomTitleDisplay').textContent=data.roomName;
        document.getElementById('roomRoleBadge').textContent=isAdmin?'👑 Admin':'🤝 Member';
        
        if(isAdmin && !myTeamName) document.getElementById('adminRegBanner').style.display='block';
        else document.getElementById('adminRegBanner').style.display='none';

        renderAuctionBlock();
    });
}

function renderAuctionBlock(){
    const data=roomState;
    const blk=document.getElementById('auctionBlockDisplay');
    const ctrl=document.getElementById('biddingControls');
    const niBtn=document.getElementById('niBtn');

    if(data.currentBlock?.active){
        ctrl.style.display='block';
        blk.innerHTML=`<div class="pname">${data.players[data.currentBlock.playerId].name}</div>`;
        document.getElementById('liveBidText').textContent=`₹${data.currentBlock.currentBid.toFixed(2)}`;

        if(myTeamName){
            const niRaw=data.currentBlock.notInterested||{};
            if(niRaw[myTeamName]){
                niBtn.textContent='🙅 Opted Out'; niBtn.className='ni-btn pressed';
            } else {
                niBtn.textContent='🙅 Not Interested'; niBtn.className='ni-btn';
                niBtn.onclick=window.pressNotInterested;
            }
        }

        if(isAdmin && data.currentBlock.lastBidderTeam && !autoSellInProgress){
            const interested = Object.values(data.members||{}).filter(m => !(data.currentBlock.notInterested||{})[m.teamName]);
            if(interested.length===1 && interested[0].teamName===data.currentBlock.lastBidderTeam){
                autoSellInProgress=true; setTimeout(()=> { window.sellPlayer(); autoSellInProgress=false; }, 1500);
            }
        }
    } else {
        ctrl.style.display='none'; blk.innerHTML='Ready...';
    }
}

window.pressNotInterested=()=>{
    if(!myTeamName) return;
    update(ref(db,`auctions/${roomId}/currentBlock/notInterested`),{[myTeamName]:true});
};

window.sellPlayer=()=>{
    const{currentBid:bid,playerId:pid,lastBidderTeam:tn}=roomState.currentBlock;
    const team=roomState.teams[tn];
    const roster=Array.isArray(team.roster)? [...team.roster] : Object.values(team.roster||{});
    roster.push({name:roomState.players[pid].name, soldPrice:bid});
    const upd={};
    upd[`teams/${tn}/roster`]=roster;
    upd[`teams/${tn}/budget`]=parseFloat((team.budget-bid).toFixed(2));
    upd[`players/${pid}/status`]='sold';
    upd[`currentBlock`]={active:false};
    update(ref(db,`auctions/${roomId}`),upd);
};

// ── Global Core ──
window.confirmTeamName=()=>{
    const tn=document.getElementById('modalTeamName').value;
    const upd={};
    upd[`auctions/${roomId}/members/${user.uid}`]={teamName:tn, uid:user.uid};
    upd[`auctions/${roomId}/teams/${tn}`]={name:tn, budget:100, roster:[]};
    update(ref(db),upd).then(()=>document.getElementById('teamNameModal').classList.remove('open'));
};

window.signInWithGoogle=()=>signInWithPopup(auth,gp);
window.logoutUser=()=>signOut(auth);
window.showAlert=(m)=>{const t=document.getElementById('toast'); document.getElementById('tmsg').textContent=m; t.className='show err'; setTimeout(()=>t.classList.remove('show'),3000);};
window.toggleCreateForm=()=>{ const f=document.getElementById('create-form'); f.style.display=f.style.display==='none'?'block':'none';};
window.switchDashTab=(t)=>{ document.getElementById('tab-created').style.display=t==='created'?'block':'none'; document.getElementById('tab-scorecards').style.display=t==='scorecards'?'block':'none';};
function switchTab(t){ document.getElementById('auction-tab').style.display=t==='auction'?'block':'none'; document.getElementById('setup-tab').style.display=t==='setup'?'block':'none'; }

</script>
